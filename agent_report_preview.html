let currentAgent = DEFAULT;

function fmt(n) { return n == null ? '0' : String(n); }
function diffSpan(diff) {
  if (diff > 0) return `<span class="diff-up">+${diff}</span>`;
  if (diff < 0) return `<span class="diff-down">${diff}</span>`;
  return `<span class="diff-flat">0</span>`;
}

function renderSummary(rec) {
  const prev = rec.prev_total || 0, cur = rec.latest.total;
  let chTxt = '与前日持平', cls = '';
  if (cur > prev) { chTxt = `↑${cur-prev} 单 (${prev?Math.round((cur-prev)/prev*100):'∞'}%)`; cls = 'bad'; }
  else if (cur < prev) { chTxt = `↓${prev-cur} 单 (-${Math.round((prev-cur)/prev*100)}%)`; cls = 'good'; }
  document.getElementById('summaryCards').innerHTML = `
    <div class="card ${cls}"><div class="label">当日总单量</div><div class="value">${fmt(cur)}</div><div class="change">${chTxt}</div></div>
    <div class="card"><div class="label">T30 超时</div><div class="value">${fmt(rec.latest.timeout)}</div><div class="change">${cur?Math.round(rec.latest.timeout/cur*100):0}%</div></div>
    <div class="card"><div class="label">未妥投</div><div class="value">${fmt(rec.latest.no_deliver)}</div><div class="change">${cur?Math.round(rec.latest.no_deliver/cur*100):0}%</div></div>
    <div class="card"><div class="label">提前/虚假</div><div class="value">${fmt(rec.latest.early_fake)}</div><div class="change">${cur?Math.round(rec.latest.early_fake/cur*100):0}%</div></div>
    <div class="card"><div class="label">不满意</div><div class="value">${fmt(rec.latest.unsat)}</div><div class="change">${cur?Math.round(rec.latest.unsat/cur*100):0}%</div></div>
  `;
}

function renderChart(rec) {
  if (chart) chart.destroy();
  const ctx = document.getElementById('trendChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: LABELS,
      datasets: [
        { label:'总单量', data:rec.series, borderColor:'#635bff', backgroundColor:'rgba(99,91,255,0.08)', fill:true, tension:0.3, borderWidth:2.5, pointRadius:4, pointHoverRadius:6 },
        { label:'T30 超时', data:rec.cat_series.timeout, borderColor:'#ff9500', borderWidth:1.8, tension:0.3, pointRadius:3, hidden:true },
        { label:'未妥投', data:rec.cat_series.no_deliver, borderColor:'#dc2626', borderWidth:1.8, tension:0.3, pointRadius:3, hidden:true },
        { label:'提前/虚假', data:rec.cat_series.early_fake, borderColor:'#16a34a', borderWidth:1.8, tension:0.3, pointRadius:3, hidden:true },
        { label:'不满意', data:rec.cat_series.unsat, borderColor:'#a855f7', borderWidth:1.8, tension:0.3, pointRadius:3, hidden:true }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ font:{size:12}, padding:12, usePointStyle:true } } },
      scales:{ y:{ beginAtZero:true, grid:{ color:'rgba(0,0,0,0.04)' } }, x:{ grid:{ display:false } } }
    }
  });
}

function renderReview(rec) {
  const ul = document.getElementById('reviewList');
  ul.innerHTML = rec.bullets.map(b => `<li class="${b.level}">${b.text}</li>`).join('');
  if (!rec.bullets.length) ul.innerHTML = '<li class="flat">无显著变化</li>';
}

function renderStations(rec) {
  const tb = document.getElementById('stationBody');
  if (!rec.sites.length) { tb.innerHTML = '<tr><td colspan="8" class="empty">该代理商当日无单</td></tr>'; return; }
  tb.innerHTML = rec.sites.map(s => {
    const ppl = [];
    if (s.contact) ppl.push(`<span class="contacts-pill">@${s.contact}</span>`);
    if (s.manager && s.manager !== s.contact) ppl.push(`<span class="contacts-pill">@${s.manager}</span>`);
    return `<tr>
      <td>${s.name}</td>
      <td class="num"><b>${s.total}</b></td>
      <td class="num">${diffSpan(s.diff)}</td>
      <td class="num">${s.timeout||0}</td>
      <td class="num">${s.no_deliver||0}</td>
      <td class="num">${s.early_fake||0}</td>
      <td class="num">${s.unsat||0}</td>
      <td>${ppl.join('')||'<span style=\"color:#9ca3af;font-size:11px;\">-</span>'}</td>
    </tr>`;
  }).join('');
}

function selectAgent(name) {
  if (!AGENTS[name]) return;
  currentAgent = name;
  document.getElementById('agentInput').value = name;
  const rec = AGENTS[name];
  renderSummary(rec);
  renderChart(rec);
  renderReview(rec);
  renderStations(rec);
}

// Combo
const input = document.getElementById('agentInput');
const list = document.getElementById('agentList');
function renderList(filter='') {
  const f = filter.trim().toLowerCase();
  const items = AGENT_NAMES.filter(n => !f || n.toLowerCase().includes(f));
  list.innerHTML = items.map(n => {
    const cnt = AGENTS[n] ? AGENTS[n].latest.total : 0;
    return `<div class="combo-item ${n===currentAgent?'active':''}" data-name="${n.replace(/"/g,'&quot;')}"><span>${n}</span><span class="num">${cnt}单</span></div>`;
  }).join('');
  list.querySelectorAll('.combo-item').forEach(el => el.addEventListener('mousedown', e => {
    e.preventDefault();
    selectAgent(el.dataset.name);
    closeList();
  }));
}
function openList() { list.classList.add('open'); renderList(input.value); }
function closeList() { list.classList.remove('open'); }
input.addEventListener('focus', openList);
input.addEventListener('input', e => { openList(); renderList(e.target.value); });
input.addEventListener('blur', () => setTimeout(closeList, 150));

// Copy review
document.getElementById('copyReview').addEventListener('click', e => {
  const rec = AGENTS[currentAgent];
  const lines = [`【${currentAgent}】${LABELS[LABELS.length-1]} 复盘`];
  rec.bullets.forEach(b => lines.push('· ' + b.text.replace(/<\/?b>/g,'')));
  const txt = lines.join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    e.target.textContent = '已复制';
    e.target.classList.add('copied');
    setTimeout(() => { e.target.textContent = '复制为文本'; e.target.classList.remove('copied'); }, 1500);
  });
});
